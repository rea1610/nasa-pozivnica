<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Rea & Antonio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Italiana&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      /*
        Prazni početni dio slike završava neposredno
        prije naslova „Okupljanje”.
      */
      --hero-height: 29.5%;
    }

    * {
      box-sizing: border-box;
    }

    html {
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
      background: #e7e1d8;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: #e7e1d8;
      color: #55515a;
      font-family: "Cormorant Garamond", serif;
    }

    body.locked {
      height: 100vh;
      overflow: hidden;
    }

    /* =========================
       KUVERTA
    ========================= */

    #envelopeScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;

      display: flex;
      align-items: center;
      justify-content: center;

      background:
        radial-gradient(
          circle at center,
          #f8f4ed 0%,
          #eae4da 62%,
          #d5cec3 100%
        );

      transition:
        opacity 1.2s ease,
        visibility 1.2s ease,
        transform 1.2s ease;
    }

    #envelopeScreen.opened {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: scale(1.025);
    }

    .envelopeWrap {
      position: relative;

      width: min(
        96vw,
        calc(94svh * 2 / 3),
        620px
      );

      aspect-ratio: 2 / 3;

      filter:
        drop-shadow(
          0 20px 32px rgba(75, 60, 44, 0.20)
        );
    }

    .envelopePicture {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;

      user-select: none;
      -webkit-user-drag: none;
    }

    .pearlButton {
      position: absolute;
      left: 50%;
      top: 53%;

      transform: translate(-50%, -50%);

      width: 18%;
      aspect-ratio: 1 / 1;

      padding: 0;
      border: 0;
      border-radius: 50%;

      background: transparent;
      cursor: pointer;

      animation: pearlPulse 2.2s ease-in-out infinite;
    }

    @keyframes pearlPulse {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.06);
      }
    }

    .openText {
      position: absolute;
      left: 5%;
      right: 5%;
      bottom: 5%;

      text-align: center;

      color: #756b60;
      font-size: clamp(10px, 1.6vw, 15px);
      font-weight: 500;
      letter-spacing: 0.23em;
      line-height: 1.4;
      text-transform: uppercase;

      pointer-events: none;
    }

    /* =========================
       DUGA POZIVNICA
    ========================= */

    #invitation {
      position: relative;

      width: min(100%, 710px);
      margin: 0 auto;

      background: #f5eee4;

      opacity: 0;
      transition: opacity 1.25s ease;
    }

    #invitation.visible {
      opacity: 1;
    }

    .fullImage {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
      border: 0;
      vertical-align: top;
    }

    /* =========================
       POČETNI PRAZNI DIO
    ========================= */

    .heroPage {
      position: absolute;
      top: 0;
      left: 0;

      width: 100%;
      height: var(--hero-height);

      z-index: 10;

      color: #514d56;
      text-align: center;

      pointer-events: none;
    }

    /* =========================
       GLAVNI NASLOV
    ========================= */

    .heroContent {
      position: absolute;

      /*
        Položaj unutar početnog praznog dijela,
        a ne prema cijeloj dugoj slici.
      */
      top: 24%;
      left: 8%;
      right: 8%;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .introText {
      margin: 0 0 13px;

      font-family: "Italiana", serif;
      font-size: clamp(10px, 1.55vw, 16px);
      font-weight: 400;
      letter-spacing: 0.19em;
      line-height: 1.45;
      text-transform: uppercase;

      color: #625c61;
    }

    .namesBlock {
      margin: 0;

      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 500;

      color: #504d56;
    }

    .firstName,
    .secondName {
      display: block;

      font-size: clamp(72px, 11.7vw, 116px);
      line-height: 0.86;
      letter-spacing: -0.035em;
    }

    .ampersand {
      display: block;

      margin: 1px 0;

      font-size: clamp(27px, 4.3vw, 41px);
      line-height: 1;

      font-style: normal;
      font-weight: 500;
    }

    .divider {
      width: 76px;
      height: 1px;

      margin: 19px auto 13px;

      background: rgba(91, 82, 84, 0.40);
    }

    .weddingDate {
      margin: 0;

      font-size: clamp(23px, 3.7vw, 36px);
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: 0.02em;

      color: #57515a;
    }

    /* =========================
       ZAKORAČITE + STRELICA
    ========================= */

    .storyButton {
      position: absolute;

      left: 5%;
      right: 5%;
      bottom: 25%;

      display: flex;
      flex-direction: column;
      align-items: center;

      color: #696169;
      text-decoration: none;

      cursor: pointer;
      pointer-events: auto;
    }

    .storyText {
      font-family: "Italiana", serif;
      font-size: clamp(9px, 1.5vw, 15px);
      font-weight: 400;
      letter-spacing: 0.22em;
      line-height: 1.5;
      text-transform: uppercase;
    }

    .storyArrow {
      margin-top: 8px;

      font-family: "Cormorant Garamond", serif;
      font-size: clamp(28px, 4.4vw, 42px);
      line-height: 1;

      animation: arrowMove 1.7s ease-in-out infinite;
    }

    @keyframes arrowMove {
      0%,
      100% {
        transform: translateY(0);
        opacity: 0.55;
      }

      50% {
        transform: translateY(11px);
        opacity: 1;
      }
    }

    /* Nevidljiva točka na početku Okupljanja */

    #okupljanjeTarget {
      position: absolute;
      top: var(--hero-height);
      left: 0;

      width: 1px;
      height: 1px;

      pointer-events: none;
    }

    /* =========================
       MOBITEL
    ========================= */

    @media (max-width: 600px) {
      body {
        background: #f5eee4;
      }

      #invitation {
        width: 100%;
        max-width: none;
      }

      .envelopeWrap {
        width: min(
          96vw,
          calc(94svh * 2 / 3)
        );
      }

      .heroContent {
        top: 24%;
        left: 5%;
        right: 5%;
      }

      .introText {
        margin-bottom: 9px;
        font-size: clamp(9px, 2.4vw, 13px);
        letter-spacing: 0.15em;
      }

      .firstName,
      .secondName {
        font-size: clamp(62px, 15.8vw, 87px);
        line-height: 0.87;
      }

      .ampersand {
        margin: 0;
        font-size: clamp(23px, 6vw, 34px);
      }

      .divider {
        width: 64px;
        margin-top: 15px;
        margin-bottom: 10px;
      }

      .weddingDate {
        font-size: clamp(20px, 5.2vw, 29px);
      }

      .storyButton {
        bottom: 11%;
      }

      .storyText {
        font-size: clamp(8px, 2.2vw, 12px);
        letter-spacing: 0.17em;
      }

      .storyArrow {
        margin-top: 6px;
        font-size: clamp(25px, 7vw, 35px);
      }
    }

    /* Podiže samo natpis POZIVAMO VAS NA NAŠE VJENČANJE */
.introText {
  transform: translateY(-40px) !important;
}

    /* Samo mobitel: spušta natpis i strelicu */
@media (max-width: 600px) {
  .storyButton {
    transform: translateY(-110px) !important;
  }
}
  </style>
</head>

<body class="locked">

  <!-- KUVERTA -->

  <div id="envelopeScreen">
    <div class="envelopeWrap">

      <img
        src="kuverta3.jpeg"
        alt="Kuverta s biserom"
        class="envelopePicture"
      >

      <button
        class="pearlButton"
        id="openInvitation"
        type="button"
        aria-label="Otvori pozivnicu"
      ></button>

      <div class="openText">
        Dodirnite biser da otvorite
      </div>

    </div>
  </div>

  <!-- POZIVNICA -->

  <main id="invitation">

    <img
      src="cijela.png"
      alt="Pozivnica za vjenčanje Ree i Antonija"
      class="fullImage"
    >

    <section class="heroPage">

      <div class="heroContent">

        <p class="introText">
          Pozivamo vas na naše vjenčanje
        </p>

        <h1 class="namesBlock">

          <span class="firstName">
            Rea
          </span>

          <span class="ampersand">
            &amp;
          </span>

          <span class="secondName">
            Antonio
          </span>

        </h1>

        <div class="divider"></div>

        <p class="weddingDate">
          16. listopada 2026.
        </p>

      </div>

      <a
        href="#okupljanjeTarget"
        class="storyButton"
        id="storyButton"
        aria-label="Zakoračite u našu priču"
      >
        <span class="storyText">
          Zakoračite u našu priču
        </span>

        <span class="storyArrow">
          ↓
        </span>
      </a>

    </section>

    <div id="okupljanjeTarget"></div>

  </main>

  <script>
    const envelopeScreen =
      document.getElementById("envelopeScreen");

    const openInvitation =
      document.getElementById("openInvitation");

    const invitation =
      document.getElementById("invitation");

    const storyButton =
      document.getElementById("storyButton");

    const okupljanjeTarget =
      document.getElementById("okupljanjeTarget");

    let opened = false;

    function showInvitation() {
      if (opened) {
        return;
      }

      opened = true;

      invitation.classList.add("visible");
      envelopeScreen.classList.add("opened");

      setTimeout(function () {
        envelopeScreen.style.display = "none";
        document.body.classList.remove("locked");

        window.scrollTo({
          top: 0,
          left: 0,
          behavior: "instant"
        });
      }, 1200);
    }

    openInvitation.addEventListener(
      "click",
      showInvitation
    );

    storyButton.addEventListener(
      "click",
      function (event) {
        event.preventDefault();

        okupljanjeTarget.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }
    );

    window.addEventListener(
      "load",
      function () {
        window.scrollTo(0, 0);
      }
    );
  </script>

</body>
</html>
