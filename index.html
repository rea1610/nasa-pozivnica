<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Rea & Antonio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Italiana&family=Parisienne&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #eee9e1;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: #eee9e1;
      font-family: "Cormorant Garamond", serif;
    }

    /* =========================
       KUVERTA
       ========================= */

    #intro {
      position: fixed;
      inset: 0;
      z-index: 9999;

      display: flex;
      align-items: center;
      justify-content: center;

      min-height: 100svh;
      padding: 24px;

      background:
        radial-gradient(
          circle at center,
          #f8f4ed 0%,
          #eee9e1 58%,
          #ddd6cc 100%
        );

      transition:
        opacity 1.1s ease,
        visibility 1.1s ease;
    }

    #intro.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .envelope-wrap {
      width: min(78vw, 620px);
      perspective: 1400px;
      cursor: pointer;
      text-align: center;
    }

    .envelope {
      position: relative;
      width: 100%;
      aspect-ratio: 1.65 / 1;

      background:
        linear-gradient(
          145deg,
          #fffdf9 0%,
          #f5efe5 50%,
          #ebe1d2 100%
        );

      border: 1px solid rgba(151, 126, 91, 0.24);
      border-radius: 3px;

      box-shadow:
        0 28px 60px rgba(79, 63, 45, 0.18),
        0 8px 18px rgba(79, 63, 45, 0.10);

      overflow: visible;
    }

    .envelope::before {
      content: "";
      position: absolute;
      inset: 0;

      background:
        linear-gradient(
          33deg,
          transparent 49.6%,
          rgba(175, 151, 116, 0.24) 50%,
          transparent 50.4%
        ),
        linear-gradient(
          -33deg,
          transparent 49.6%,
          rgba(175, 151, 116, 0.24) 50%,
          transparent 50.4%
        );

      pointer-events: none;
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;

      width: 100%;
      height: 58%;

      background:
        linear-gradient(
          160deg,
          #fffdf9,
          #eee5d8
        );

      clip-path: polygon(
        0 0,
        100% 0,
        50% 100%
      );

      transform-origin: top center;
      transition: transform 0.9s ease;

      z-index: 3;

      border-top: 1px solid rgba(151, 126, 91, 0.16);
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 50%;

      width: clamp(64px, 10vw, 92px);
      height: clamp(64px, 10vw, 92px);

      transform: translate(-50%, -50%);

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 50%;

      color: #8f7044;

      font-family: "Cormorant Garamond", serif;
      font-size: clamp(20px, 3vw, 31px);
      font-weight: 500;

      background:
        radial-gradient(
          circle at 35% 30%,
          #f7e5b5,
          #d7b574 48%,
          #aa8247 100%
        );

      border: 3px double rgba(118, 85, 43, 0.45);

      box-shadow:
        0 6px 15px rgba(83, 58, 31, 0.24),
        inset 0 1px 4px rgba(255,255,255,0.7);

      z-index: 5;
    }

    .open-text {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 8%;

      z-index: 6;

      color: #75634f;

      font-size: clamp(12px, 1.8vw, 17px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .envelope-wrap:hover .envelope {
      transform: translateY(-4px);
    }

    .envelope {
      transition:
        transform 0.4s ease,
        opacity 0.7s ease;
    }

    .envelope.opening .flap {
      transform: rotateX(180deg);
    }

    .envelope.opening {
      transform: translateY(25px) scale(1.03);
    }

    /* =========================
       POZIVNICA
       ========================= */

    #invitation {
      width: min(100%, 710px);
      margin: 0 auto;

      position: relative;

      background: #f4ede2;

      opacity: 0;
      visibility: hidden;

      transition: opacity 1.2s ease;
    }

    #invitation.show {
      opacity: 1;
      visibility: visible;
    }

    .invitation-image {
      display: block;

      width: 100%;
      height: auto;

      margin: 0;
      padding: 0;

      vertical-align: top;
    }

    /* =========================
       POČETNA STRANICA
       ========================= */

    .hero-overlay {
      position: absolute;

      top: 0;
      left: 0;

      width: 100%;

      height: 19.5%;

      z-index: 10;

      display: flex;
      flex-direction: column;
      align-items: center;

      text-align: center;

      pointer-events: none;

      color: #514c48;
    }

    .hero-content {
      width: 84%;

      margin-top: 9.5%;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-small {
      font-size: clamp(10px, 2.15vw, 17px);

      font-weight: 500;

      letter-spacing: 0.30em;

      text-transform: uppercase;

      margin-bottom: 4.5%;
    }

    .name {
      font-family: "Italiana", serif;

      font-size: clamp(55px, 13vw, 102px);

      font-weight: 400;

      line-height: 0.88;

      letter-spacing: 0.01em;
    }

    .ampersand {
      font-family: "Cormorant Garamond", serif;

      font-size: clamp(30px, 6vw, 48px);

      line-height: 1;

      margin: 2.5% 0;
    }

    .date {
      margin-top: 5%;

      font-size: clamp(21px, 4.4vw, 34px);

      font-weight: 500;

      letter-spacing: 0.05em;
    }

    .scroll-area {
      position: absolute;

      top: 13.6%;
      left: 50%;

      transform: translateX(-50%);

      z-index: 12;

      display: flex;
      flex-direction: column;
      align-items: center;

      color: #6f655b;

      text-decoration: none;

      cursor: pointer;

      pointer-events: auto;
    }

    .scroll-text {
      font-size: clamp(10px, 1.9vw, 15px);

      letter-spacing: 0.25em;

      text-transform: uppercase;

      white-space: nowrap;
    }

    .arrow {
      margin-top: 13px;

      font-size: clamp(25px, 5vw, 40px);

      font-weight: 300;

      animation: arrowMove 1.7s ease-in-out infinite;
    }

    @keyframes arrowMove {
      0%,
      100% {
        transform: translateY(0);
        opacity: 0.55;
      }

      50% {
        transform: translateY(13px);
        opacity: 1;
      }
    }

    /* =========================
       MOBITEL
       ========================= */

    @media (max-width: 600px) {
      #intro {
        padding: 18px;
      }

      .envelope-wrap {
        width: 88vw;
      }

      #invitation {
        width: 100%;
      }

      .hero-content {
        width: 88%;
        margin-top: 10%;
      }

      .hero-small {
        letter-spacing: 0.22em;
        margin-bottom: 5%;
      }

      .name {
        font-size: clamp(53px, 15vw, 82px);
      }

      .ampersand {
        font-size: clamp(28px, 7vw, 42px);
      }

      .date {
        font-size: clamp(20px, 5vw, 29px);
      }

      .scroll-area {
        top: 14.2%;
      }
    }

    /* =========================
       ŠIRI EKRANI
       ========================= */

    @media (min-width: 900px) {
      body {
        padding: 0;
      }

      #invitation {
        box-shadow:
          0 0 40px rgba(67, 54, 40, 0.12);
      }
    }
  </style>
</head>

<body>

  <!-- KUVERTA -->

  <section id="intro">

    <div
      class="envelope-wrap"
      id="envelopeWrap"
      role="button"
      tabindex="0"
      aria-label="Otvori pozivnicu"
    >

      <div class="envelope" id="envelope">

        <div class="flap"></div>

        <div class="seal">
          R & A
        </div>

        <div class="open-text">
          Otvori pozivnicu
        </div>

      </div>

    </div>

  </section>


  <!-- POZIVNICA -->

  <main id="invitation">

    <img
      src="cijela.png"
      alt="Pozivnica za vjenčanje Ree i Antonija"
      class="invitation-image"
      id="fullInvitation"
    />


    <!-- NASLOVNA -->

    <section class="hero-overlay">

      <div class="hero-content">

        <div class="hero-small">
          Pozivamo vas na naše vjenčanje
        </div>

        <div class="name">
          Rea
        </div>

        <div class="ampersand">
          &amp;
        </div>

        <div class="name">
          Antonio
        </div>

        <div class="date">
          16. listopada 2026.
        </div>

      </div>

    </section>


    <!-- STRELICA -->

    <a
      href="#details"
      class="scroll-area"
      id="scrollButton"
      aria-label="Zakoračite u našu priču"
    >

      <span class="scroll-text">
        Zakoračite u našu priču
      </span>

      <span class="arrow">
        ↓
      </span>

    </a>


    <div
      id="details"
      style="
        position: absolute;
        top: 18.5%;
        left: 0;
        width: 1px;
        height: 1px;
      "
    ></div>

  </main>


  <script>
    const intro = document.getElementById("intro");
    const envelopeWrap = document.getElementById("envelopeWrap");
    const envelope = document.getElementById("envelope");
    const invitation = document.getElementById("invitation");
    const scrollButton = document.getElementById("scrollButton");
    const details = document.getElementById("details");

    let opened = false;


    function openInvitation() {

      if (opened) return;

      opened = true;

      envelope.classList.add("opening");


      setTimeout(() => {

        invitation.classList.add("show");

        intro.classList.add("hide");

        window.scrollTo({
          top: 0,
          behavior: "instant"
        });

      }, 850);


      setTimeout(() => {

        intro.style.display = "none";

      }, 2000);

    }


    envelopeWrap.addEventListener(
      "click",
      openInvitation
    );


    envelopeWrap.addEventListener(
      "keydown",
      function(event) {

        if (
          event.key === "Enter" ||
          event.key === " "
        ) {

          event.preventDefault();

          openInvitation();

        }

      }
    );


    scrollButton.addEventListener(
      "click",
      function(event) {

        event.preventDefault();

        details.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });

      }
    );


    window.addEventListener(
      "load",
      function() {

        window.scrollTo(0, 0);

      }
    );
  </script>

</body>
</html>
