<!DOCTYPE html>
<html lang="hr">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Rea & Antonio</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Italiana&display=swap"
    rel="stylesheet"
  >

  <style>

    * {
      box-sizing: border-box;
    }

    html {
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
      background: #eeeae3;
    }

    body {
      margin: 0;
      padding: 0;

      min-height: 100vh;

      background:
        radial-gradient(
          circle at center,
          #f7f4ee 0%,
          #eeeae3 55%,
          #ddd8d0 100%
        );

      color: #57515a;

      overflow-x: hidden;
    }


    /* ============================= */
    /* KUVERTA                       */
    /* ============================= */

    #envelope-screen {
      position: fixed;

      inset: 0;

      z-index: 9999;

      display: flex;
      justify-content: center;
      align-items: center;

      background:
        radial-gradient(
          circle at center,
          #f8f5ef 0%,
          #ebe7df 58%,
          #d8d3ca 100%
        );

      transition:
        opacity 1.1s ease,
        visibility 1.1s ease;
    }


    #envelope-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }


    .envelope {
      position: relative;

      width: min(72vw, 430px);
      aspect-ratio: 0.68 / 1;

      background:
        linear-gradient(
          145deg,
          #fffdf8 0%,
          #f7f1e7 48%,
          #eee5d7 100%
        );

      box-shadow:
        0 25px 60px rgba(75, 63, 49, 0.18),
        0 5px 15px rgba(75, 63, 49, 0.12);

      cursor: pointer;

      overflow: hidden;

      transform: translateZ(0);

      transition: transform 0.4s ease;
    }


    .envelope:hover {
      transform: scale(1.015);
    }


    /* donji lijevi pregib */

    .envelope::before {
      content: "";

      position: absolute;

      left: -3%;
      bottom: -2%;

      width: 75%;
      height: 58%;

      background:
        linear-gradient(
          145deg,
          transparent 49.4%,
          rgba(190, 174, 150, 0.25) 49.8%,
          rgba(255, 253, 247, 0.96) 50.3%
        );

      z-index: 2;
    }


    /* donji desni pregib */

    .envelope::after {
      content: "";

      position: absolute;

      right: -3%;
      bottom: -2%;

      width: 75%;
      height: 58%;

      background:
        linear-gradient(
          215deg,
          transparent 49.4%,
          rgba(190, 174, 150, 0.25) 49.8%,
          rgba(250, 246, 238, 0.96) 50.3%
        );

      z-index: 2;
    }


    .envelope-flap {
      position: absolute;

      top: 0;
      left: 0;

      width: 100%;
      height: 57%;

      background:
        linear-gradient(
          160deg,
          #fffdf8 0%,
          #f9f3e9 70%,
          #eee5d7 100%
        );

      clip-path:
        polygon(
          0 0,
          100% 0,
          50% 100%
        );

      z-index: 4;

      filter:
        drop-shadow(
          0 5px 4px rgba(100, 82, 59, 0.08)
        );
    }


    .lace-left,
    .lace-right {
      position: absolute;

      top: 19%;

      width: 53%;
      height: 35%;

      z-index: 5;

      opacity: 0.9;

      border-bottom:
        12px double rgba(255, 255, 255, 0.88);
    }


    .lace-left {
      left: -5%;

      transform: rotate(42deg);
    }


    .lace-right {
      right: -5%;

      transform: rotate(-42deg);
    }


    .lace-left::after,
    .lace-right::after {
      content: "❀  ❁  ❀  ❁  ❀  ❁";

      position: absolute;

      bottom: -8px;

      width: 100%;

      text-align: center;

      color: rgba(255, 255, 255, 0.96);

      font-size: 18px;

      letter-spacing: 3px;
    }


    .pearl {
      position: absolute;

      left: 50%;
      top: 52%;

      transform: translate(-50%, -50%);

      width: 58px;
      height: 58px;

      border-radius: 50%;

      z-index: 10;

      background:
        radial-gradient(
          circle at 34% 28%,
          #ffffff 0%,
          #fffdf8 16%,
          #eee6d6 43%,
          #cfc0a7 70%,
          #a9977c 100%
        );

      border:
        2px solid rgba(181, 159, 124, 0.55);

      box-shadow:
        0 5px 10px rgba(75, 61, 44, 0.22),
        inset 0 0 10px rgba(255, 255, 255, 0.85);

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: "Cormorant Garamond", serif;

      font-size: 13px;

      color: #9b825e;

      letter-spacing: 1px;
    }


    .open-text {
      position: absolute;

      left: 0;
      right: 0;

      top: 60%;

      z-index: 11;

      text-align: center;

      font-family: "Cormorant Garamond", serif;

      font-size: 16px;

      font-weight: 500;

      letter-spacing: 0.22em;

      text-transform: uppercase;

      color: #87745f;
    }


    /* ============================= */
    /* POZIVNICA                     */
    /* ============================= */

    #invitation {
      width: 100%;

      opacity: 0;

      transition: opacity 1.2s ease;
    }


    #invitation.visible {
      opacity: 1;
    }


    .invitation-wrapper {
      position: relative;

      width: min(100%, 720px);

      margin: 0 auto;

      line-height: 0;

      background: #f5eee3;
    }


    .main-image {
      display: block;

      width: 100%;
      height: auto;

      margin: 0;
      padding: 0;

      border: 0;

      vertical-align: top;
    }


    /* ============================= */
    /* PRVA STRANICA                 */
    /* ============================= */

    .hero-main {
      position: absolute;

      top: 0;
      left: 0;

      width: 100%;

      /*
        Prva stranica slike je u omjeru 2:3.
        OVAJ BLOK SE VIŠE NE RAČUNA
        PREMA CIJELOJ DUGOJ SLICI.
      */

      aspect-ratio: 2 / 3;

      z-index: 20;

      text-align: center;

      color: #514d55;

      pointer-events: none;

      line-height: normal;
    }


    .hero-content {
      position: absolute;

      top: 14.5%;

      left: 7%;
      right: 7%;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: flex-start;
    }


    .invite-text {
      margin: 0 0 22px;

      font-family:
        "Cormorant Garamond",
        serif;

      font-size:
        clamp(
          11px,
          1.75vw,
          17px
        );

      font-weight: 500;

      letter-spacing: 0.25em;

      text-transform: uppercase;

      color: #665f62;
    }


    .names {
      margin: 0;

      font-family:
        "Italiana",
        "Cormorant Garamond",
        serif;

      font-size:
        clamp(
          65px,
          10.5vw,
          104px
        );

      font-weight: 400;

      line-height: 0.82;

      letter-spacing: -0.025em;

      color: #4f4b54;
    }


    .name {
      display: block;
    }


    .ampersand {
      display: block;

      margin: 17px 0 14px;

      font-family:
        "Cormorant Garamond",
        serif;

      font-size:
        clamp(
          29px,
          4.6vw,
          44px
        );

      font-style: italic;

      font-weight: 400;

      line-height: 1;

      color: #5c565d;
    }


    .wedding-date {
      margin-top: 31px;

      font-family:
        "Cormorant Garamond",
        serif;

      font-size:
        clamp(
          23px,
          3.7vw,
          35px
        );

      font-weight: 500;

      letter-spacing: 0.035em;

      color: #57515a;
    }


    /* ============================= */
    /* STRELICA                      */
    /* ============================= */

    .story-block {
      position: absolute;

      left: 5%;
      right: 5%;

      bottom: 12.5%;

      display: flex;

      flex-direction: column;

      align-items: center;

      color: #71685f;

      text-decoration: none;

      pointer-events: auto;
    }


    .story-text {
      font-family:
        "Cormorant Garamond",
        serif;

      font-size:
        clamp(
          11px,
          1.7vw,
          16px
        );

      font-weight: 500;

      letter-spacing: 0.25em;

      text-transform: uppercase;
    }


    .story-arrow {
      margin-top: 10px;

      font-family:
        "Cormorant Garamond",
        serif;

      font-size:
        clamp(
          28px,
          4.5vw,
          42px
        );

      line-height: 1;

      animation:
        arrowMove
        1.7s
        ease-in-out
        infinite;
    }


    @keyframes arrowMove {

      0%,
      100% {
        transform:
          translateY(0);

        opacity: 0.55;
      }

      50% {
        transform:
          translateY(11px);

        opacity: 1;
      }

    }


    /* ============================= */
    /* MOBITEL                       */
    /* ============================= */

    @media (max-width: 600px) {

      .envelope {
        width: min(76vw, 360px);
      }


      .pearl {
        width: 50px;
        height: 50px;

        font-size: 11px;
      }


      .open-text {
        font-size: 13px;

        letter-spacing: 0.18em;
      }


      .hero-content {
        top: 14.5%;

        left: 5%;
        right: 5%;
      }


      .invite-text {
        margin-bottom: 16px;

        font-size:
          clamp(
            10px,
            2.7vw,
            14px
          );

        letter-spacing: 0.18em;
      }


      .names {
        font-size:
          clamp(
            55px,
            15vw,
            82px
          );

        line-height: 0.84;
      }


      .ampersand {
        margin:
          10px
          0
          9px;

        font-size:
          clamp(
            25px,
            7vw,
            37px
          );
      }


      .wedding-date {
        margin-top: 21px;

        font-size:
          clamp(
            20px,
            5.7vw,
            31px
          );
      }


      .story-block {
        bottom: 11.5%;
      }


      .story-text {
        font-size:
          clamp(
            9px,
            2.5vw,
            13px
          );

        letter-spacing: 0.2em;
      }


      .story-arrow {
        font-size:
          clamp(
            25px,
            7vw,
            36px
          );
      }

    }


  </style>

</head>


<body>


  <!-- ============================= -->
  <!-- KUVERTA                       -->
  <!-- ============================= -->

  <div id="envelope-screen">

    <div
      class="envelope"
      id="envelope"
      role="button"
      tabindex="0"
      aria-label="Otvori pozivnicu"
    >

      <div class="envelope-flap"></div>

      <div class="lace-left"></div>

      <div class="lace-right"></div>

      <div class="pearl">
        R&A
      </div>

      <div class="open-text">
        Otvori pozivnicu
      </div>

    </div>

  </div>



  <!-- ============================= -->
  <!-- POZIVNICA                     -->
  <!-- ============================= -->

  <main id="invitation">

    <div class="invitation-wrapper">


      <!-- JEDNA VELIKA SLIKA -->

      <img
        src="cijela.png"
        alt="Pozivnica za vjenčanje Ree i Antonija"
        class="main-image"
        id="main-image"
      >



      <!-- ========================= -->
      <!-- TEKST NA PRVOJ STRANICI   -->
      <!-- ========================= -->

      <section class="hero-main">


        <div class="hero-content">


          <div class="invite-text">

            Pozivamo vas na naše vjenčanje

          </div>


          <h1 class="names">

            <span class="name">
              Rea
            </span>

            <span class="ampersand">
              &
            </span>

            <span class="name">
              Antonio
            </span>

          </h1>


          <div class="wedding-date">

            16. listopada 2026.

          </div>


        </div>



        <a
          href="#story"
          class="story-block"
        >

          <span class="story-text">

            Zakoračite u našu priču

          </span>


          <span class="story-arrow">

            ↓

          </span>

        </a>


      </section>



      <!-- TOČKA NA KOJU IDE STRELICA -->

      <div
        id="story"
        style="
          position: absolute;
          top: 19.5%;
          left: 0;
          width: 1px;
          height: 1px;
        "
      ></div>


    </div>

  </main>



  <script>

    const envelopeScreen =
      document.getElementById(
        "envelope-screen"
      );


    const envelope =
      document.getElementById(
        "envelope"
      );


    const invitation =
      document.getElementById(
        "invitation"
      );


    function openInvitation() {

      envelope.style.transform =
        "scale(1.06)";


      setTimeout(() => {

        envelopeScreen.classList.add(
          "hidden"
        );


        invitation.classList.add(
          "visible"
        );


        window.scrollTo({
          top: 0,
          behavior: "instant"
        });

      }, 350);

    }


    envelope.addEventListener(
      "click",
      openInvitation
    );


    envelope.addEventListener(
      "keydown",
      function(event) {

        if (
          event.key === "Enter" ||
          event.key === " "
        ) {

          event.preventDefault();

          openInvitation();

        }

      }
    );


  </script>


</body>

</html>
