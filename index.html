<!DOCTYPE html>
<html lang="hr">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Rea & Antonio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Italiana&family=Parisienne&display=swap"
    rel="stylesheet"
  >


  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    html {
      scroll-behavior: smooth;
      background: #eee9e1;
    }


    body {
      margin: 0;

      min-height: 100vh;

      overflow-x: hidden;

      background: #eee9e1;

      font-family:
        "Cormorant Garamond",
        serif;
    }



    /* ================================
       KUVERTA
       ================================ */


    #intro {

      position: fixed;

      inset: 0;

      z-index: 9999;


      display: flex;

      align-items: center;

      justify-content: center;


      min-height: 100svh;


      background:

        radial-gradient(

          circle at center,

          #f8f4ed 0%,

          #eee9e1 60%,

          #ded7cd 100%

        );


      transition:

        opacity 1.2s ease,

        visibility 1.2s ease;

    }



    #intro.hide {

      opacity: 0;

      visibility: hidden;

      pointer-events: none;

    }



    .envelope {

      position: relative;


      height: min(88svh, 820px);

      aspect-ratio: 1024 / 1536;


      background-image:
        url("kuverta.PNG");


      background-size: contain;

      background-repeat: no-repeat;

      background-position: center;


      cursor: pointer;


      filter:

        drop-shadow(
          0 22px 30px
          rgba(69, 53, 38, 0.20)
        );


      transition:

        transform 0.5s ease,

        opacity 0.8s ease;

    }



    .envelope:hover {

      transform: scale(1.015);

    }



    .envelope.opening {

      transform:

        scale(1.06)

        translateY(-8px);


      opacity: 0;

    }



    .pearl-button {

      position: absolute;


      left: 50%;

      top: 53%;


      transform:

        translate(-50%, -50%);


      width: 15%;

      aspect-ratio: 1 / 1;


      border: none;

      border-radius: 50%;


      background: transparent;


      cursor: pointer;


      z-index: 10;

    }



    .open-text {

      position: absolute;


      left: 0;

      right: 0;


      top: 60%;


      text-align: center;


      color: #766858;


      font-size:

        clamp(
          11px,
          1.5vw,
          15px
        );


      letter-spacing: 0.25em;


      text-transform: uppercase;


      pointer-events: none;

    }



    /* ================================
       POZIVNICA
       ================================ */


    #invitation {

      position: relative;


      width:

        min(
          100%,
          710px
        );


      margin:

        0 auto;


      background:

        #f4ede2;


      opacity: 0;

      visibility: hidden;


      transition:

        opacity 1.3s ease;

    }



    #invitation.show {

      opacity: 1;

      visibility: visible;

    }



    .invitation-image {

      display: block;


      width: 100%;

      height: auto;


      margin: 0;

      padding: 0;


      vertical-align: top;

    }



    /* ================================
       NASLOVNA
       ================================ */


    .hero-main {

      position: absolute;


      top: 0;


      left: 0;

      right: 0;


      height: 13%;


      z-index: 20;


      display: flex;

      flex-direction: column;

      align-items: center;


      text-align: center;


      color: #4f4a46;


      pointer-events: none;

    }



    .hero-content {

      width: 88%;


      margin-top: 5.5%;


      display: flex;

      flex-direction: column;

      align-items: center;

    }



    .invite-text {

      font-size:

        clamp(
          12px,
          2.2vw,
          18px
        );


      font-weight: 500;


      letter-spacing: 0.30em;


      text-transform: uppercase;


      margin-bottom: 5%;

    }



    .names {

      font-family:

        "Italiana",

        serif;


      font-size:

        clamp(
          66px,
          13vw,
          108px
        );


      font-weight: 400;


      line-height: 0.88;


      letter-spacing: 0.01em;

    }



    .ampersand {

      display: block;


      font-family:

        "Cormorant Garamond",

        serif;


      font-size:

        clamp(
          31px,
          6vw,
          48px
        );


      line-height: 1;


      margin:

        16px 0;

    }



    .wedding-date {

      margin-top: 6%;


      font-size:

        clamp(
          22px,
          4.3vw,
          34px
        );


      font-weight: 500;


      letter-spacing: 0.05em;

    }



    /* ================================
       STRELICA
       ================================ */


    .story-block {

      position: absolute;


      top: 13.1%;


      left: 5%;

      right: 5%;


      z-index: 25;


      display: flex;

      flex-direction: column;

      align-items: center;


      text-align: center;


      color: #6f655b;


      text-decoration: none;


      cursor: pointer;

    }



    .story-text {

      font-size:

        clamp(
          11px,
          2vw,
          16px
        );


      letter-spacing: 0.28em;


      text-transform: uppercase;

    }



    .story-arrow {

      margin-top: 15px;


      font-size:

        clamp(
          27px,
          5vw,
          42px
        );


      font-weight: 300;


      animation:

        arrowMove

        1.7s

        ease-in-out

        infinite;

    }



    @keyframes arrowMove {

      0%,
      100% {

        transform:
          translateY(0);

        opacity: 0.55;

      }


      50% {

        transform:
          translateY(13px);

        opacity: 1;

      }

    }



    /* ================================
       MOBITEL
       ================================ */


    @media (
      max-width: 600px
    ) {


      .envelope {

        height: auto;

        width: 92vw;

        aspect-ratio:
          1024 / 1536;

      }


      #invitation {

        width: 100%;

      }


      .hero-content {

        width: 90%;

        margin-top: 6%;

      }


      .invite-text {

        font-size: 11px;

        letter-spacing: 0.22em;

        margin-bottom: 5%;

      }


      .names {

        font-size:

          clamp(
            57px,
            16vw,
            82px
          );

      }


      .ampersand {

        font-size:

          clamp(
            28px,
            7vw,
            40px
          );


        margin:

          10px 0;

      }


      .wedding-date {

        margin-top: 5%;


        font-size:

          clamp(
            20px,
            5.3vw,
            29px
          );

      }


      .story-block {

        top: 13.2%;

      }


      .story-text {

        font-size: 10px;

        letter-spacing: 0.22em;

      }


      .story-arrow {

        margin-top: 10px;

      }

    }



    /* ================================
       RAČUNALO
       ================================ */


    @media (
      min-width: 900px
    ) {


      #invitation {

        box-shadow:

          0 0 45px

          rgba(
            67,
            54,
            40,
            0.13
          );

      }


      .envelope {

        height:

          min(
            90vh,
            860px
          );

      }

    }


  </style>

</head>



<body>



  <!-- ================================
       KUVERTA
       ================================ -->


  <section id="intro">


    <div
      class="envelope"
      id="envelope"
      role="button"
      tabindex="0"
      aria-label="Otvori pozivnicu"
    >


      <button
        class="pearl-button"
        id="pearlButton"
        aria-label="Otvori pozivnicu"
      ></button>


      <div class="open-text">

        Otvori pozivnicu

      </div>


    </div>


  </section>



  <!-- ================================
       POZIVNICA
       ================================ -->


  <main id="invitation">


    <img

      src="cijela.png"

      alt="Pozivnica za vjenčanje Ree i Antonija"

      class="invitation-image"

    >



    <!-- ================================
         NASLOVNA
         ================================ -->


    <section class="hero-main">


      <div class="hero-content">


        <div class="invite-text">

          Pozivamo vas na naše vjenčanje

        </div>



        <div class="names">

          Rea

        </div>



        <div class="ampersand">

          &amp;

        </div>



        <div class="names">

          Antonio

        </div>



        <div class="wedding-date">

          16. listopada 2026.

        </div>


      </div>


    </section>



    <!-- ================================
         STRELICA
         ================================ -->


    <a

      href="#details"

      class="story-block"

      id="storyButton"

    >


      <span class="story-text">

        Zakoračite u našu priču

      </span>


      <span class="story-arrow">

        ↓

      </span>


    </a>



    <div

      id="details"

      style="
        position: absolute;
        top: 17%;
        left: 0;
        width: 1px;
        height: 1px;
      "

    ></div>


  </main>



  <!-- ================================
       JAVASCRIPT
       ================================ -->


  <script>


    const intro =
      document.getElementById(
        "intro"
      );


    const envelope =
      document.getElementById(
        "envelope"
      );


    const pearlButton =
      document.getElementById(
        "pearlButton"
      );


    const invitation =
      document.getElementById(
        "invitation"
      );


    const storyButton =
      document.getElementById(
        "storyButton"
      );


    const details =
      document.getElementById(
        "details"
      );


    let opened = false;



    function openInvitation() {


      if (opened) {

        return;

      }


      opened = true;


      envelope.classList.add(
        "opening"
      );



      setTimeout(

        function() {


          invitation.classList.add(
            "show"
          );


          intro.classList.add(
            "hide"
          );


          window.scrollTo({

            top: 0,

            left: 0,

            behavior: "instant"

          });


        },

        700

      );



      setTimeout(

        function() {


          intro.style.display =
            "none";


        },

        1900

      );


    }



    pearlButton.addEventListener(

      "click",

      function(event) {


        event.stopPropagation();


        openInvitation();


      }

    );



    envelope.addEventListener(

      "click",

      openInvitation

    );



    envelope.addEventListener(

      "keydown",

      function(event) {


        if (

          event.key === "Enter"

          ||

          event.key === " "

        ) {


          event.preventDefault();


          openInvitation();


        }


      }

    );



    storyButton.addEventListener(

      "click",

      function(event) {


        event.preventDefault();


        details.scrollIntoView({

          behavior: "smooth",

          block: "start"

        });


      }

    );



    window.addEventListener(

      "load",

      function() {


        window.scrollTo(

          0,

          0

        );


      }

    );


  </script>



</body>

</html>
