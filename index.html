<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rea & Antonio</title>

<style>

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
}

body {
    background: #d9d2c8;
    overflow-x: hidden;
}


/* =========================
   KUVERTA
========================= */

#envelopeScreen {
    position: fixed;
    inset: 0;
    z-index: 1000;

    display: flex;
    align-items: center;
    justify-content: center;

    background: #d9d2c8;

    opacity: 1;

    transition:
        opacity 1.6s ease,
        transform 1.6s ease;
}

#envelopeScreen.opened {
    opacity: 0;
    transform: scale(1.04);
    pointer-events: none;
}

.envelope {
    position: relative;

    width: min(100vw, 600px);
    height: 100svh;

    background-image: url("kuverta.PNG");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}


/* =========================
   BISER
========================= */

.pearl {
    position: absolute;

    left: 50%;
    top: 50%;

    transform: translate(-50%, -50%);

    width: 76px;
    height: 76px;

    padding: 0;

    border: 0;
    border-radius: 50%;

    cursor: pointer;

    background:
        radial-gradient(
            circle at 32% 27%,
            #ffffff 0%,
            #fffdf8 18%,
            #ebe4d8 46%,
            #c9beb0 72%,
            #a79b8d 100%
        );

    box-shadow:
        inset 7px 7px 13px rgba(255,255,255,.9),
        inset -9px -10px 15px rgba(120,105,90,.2),
        0 8px 18px rgba(80,70,60,.28);

    animation: pearlPulse 2.4s infinite ease-in-out;
}

.pearl::after {
    content: "";

    position: absolute;

    width: 18px;
    height: 11px;

    top: 17px;
    left: 18px;

    border-radius: 50%;

    background: rgba(255,255,255,.85);

    filter: blur(2px);
}

@keyframes pearlPulse {

    0%,
    100% {
        transform:
            translate(-50%, -50%)
            scale(1);
    }

    50% {
        transform:
            translate(-50%, -50%)
            scale(1.07);
    }

}


/* =========================
   TEKST NA KUVERTI
========================= */

.openText {
    position: absolute;

    left: 0;
    right: 0;
    bottom: 7%;

    text-align: center;

    font-family: Georgia, serif;

    font-size: 12px;

    letter-spacing: 4px;

    text-transform: uppercase;

    color: #81786e;
}


/* =========================
   POZIVNICA
========================= */

#invitation {
    width: 100%;

    opacity: 0;

    transition: opacity 1.6s ease;
}

#invitation.visible {
    opacity: 1;
}

.invitationWrapper {
    width: 100%;
    max-width: 600px;

    margin: 0 auto;

    padding: 0;

    background: #f3eadb;

    overflow: hidden;
}


/* =========================
   SLIKE
========================= */

.page {
    position: relative;

    width: 100%;

    margin: 0;
    padding: 0;

    line-height: 0;

    font-size: 0;
}

.page img {
    display: block;

    width: 100%;
    height: auto;

    margin: 0;
    padding: 0;

    border: 0;
}


/* =========================
   TELEFONI
========================= */

.phoneLink {
    position: absolute;

    display: block;

    z-index: 10;

    background: transparent;

    cursor: pointer;
}

.reaPhone {
    left: 30%;
    top: 57%;

    width: 40%;
    height: 8%;
}

.antonioPhone {
    left: 30%;
    top: 68%;

    width: 40%;
    height: 8%;
}


/* =========================
   MOBITEL
========================= */

@media (max-width: 600px) {

    .envelope {
        width: 100vw;
        height: 100svh;
    }

    .invitationWrapper {
        width: 100%;
        max-width: none;
    }

}

</style>

</head>


<body>


<!-- KUVERTA -->

<div id="envelopeScreen">

    <div class="envelope">

        <button
            class="pearl"
            id="pearl"
            aria-label="Otvori pozivnicu">
        </button>

        <div class="openText">
            dodirnite biser da otvorite
        </div>

    </div>

</div>


<!-- POZIVNICA -->

<main id="invitation">

    <div class="invitationWrapper">


        <!-- NASLOVNA -->

        <section class="page">

            <img
                src="naslovna2.png"
                alt="Rea i Antonio">

        </section>


        <!-- OKUPLJANJE -->

        <section class="page">

            <img
                src="okupljanje3.PNG"
                alt="Okupljanje">

        </section>


        <!-- CRKVENI OBRED -->

        <section class="page">

            <img
                src="misa2.PNG"
                alt="Crkveni obred">

        </section>


        <!-- SVADBENA PROSLAVA -->

        <section class="page">

            <img
                src="omorika2.PNG"
                alt="Svadbena proslava">

        </section>


        <!-- POTVRDA DOLASKA -->

        <section class="page">

            <img
                src="potvrda2.PNG"
                alt="Potvrda dolaska">


            <a
                class="phoneLink reaPhone"
                href="tel:0919513980"
                aria-label="Nazovi Reu">
            </a>


            <a
                class="phoneLink antonioPhone"
                href="tel:0921200512"
                aria-label="Nazovi Antonija">
            </a>

        </section>


    </div>

</main>


<script>

const pearl =
    document.getElementById("pearl");

const envelopeScreen =
    document.getElementById("envelopeScreen");

const invitation =
    document.getElementById("invitation");

let opened = false;


pearl.addEventListener("click", function () {

    if (opened) {
        return;
    }

    opened = true;

    envelopeScreen.classList.add("opened");


    setTimeout(function () {

        envelopeScreen.style.display = "none";

        invitation.classList.add("visible");

        window.scrollTo(0, 0);

    }, 1600);

});

</script>


</body>

</html>
