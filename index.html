<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Rea & Antonio</title>

    <style>

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
        }

        body {
            background: #d9d2c8;
            overflow-x: hidden;
        }

        .pozivnica {
            width: 100%;
            max-width: 1024px;
            margin: 0 auto;
            padding: 0;
            background: #f3eadb;
            overflow: hidden;
        }

        .slika {
            display: block;
            width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            border: 0;
            vertical-align: bottom;
        }

        .sekcija {
            position: relative;
            width: 100%;
            margin: 0;
            padding: 0;
            line-height: 0;
        }

        .telefon {
            position: absolute;
            display: block;
            z-index: 10;
            cursor: pointer;
            background: transparent;
        }

        .telefon-rea {
            left: 37%;
            top: 64%;
            width: 26%;
            height: 6%;
        }

        .telefon-antonio {
            left: 37%;
            top: 74%;
            width: 26%;
            height: 6%;
        }

        @media (max-width: 600px) {

            .pozivnica {
                width: 100%;
                max-width: none;
            }

        }

    </style>

</head>

<body>

    <main class="pozivnica">

        <!-- NASLOVNA -->

        <section class="sekcija">
            <img
                class="slika"
                src="naslovna2.png"
                alt="Rea i Antonio"
            >
        </section>


        <!-- OKUPLJANJE -->

        <section class="sekcija">
            <img
                class="slika"
                src="okupljanje2.PNG"
                alt="Okupljanje"
            >
        </section>


        <!-- CRKVENI OBRED -->

        <section class="sekcija">
            <img
                class="slika"
                src="misa2.PNG"
                alt="Crkveni obred"
            >
        </section>


        <!-- SVADBENA PROSLAVA -->

        <section class="sekcija">
            <img
                class="slika"
                src="omorika2.PNG"
                alt="Svadbena proslava"
            >
        </section>


        <!-- POTVRDA DOLASKA -->

        <section class="sekcija">

            <img
                class="slika"
                src="potvrda2.PNG"
                alt="Potvrda dolaska"
            >

            <a
                class="telefon telefon-rea"
                href="tel:0919513980"
                aria-label="Nazovi Reu"
            ></a>

            <a
                class="telefon telefon-antonio"
                href="tel:0921200512"
                aria-label="Nazovi Antonija"
            ></a>

        </section>

    </main>

</body>

</html>
