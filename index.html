<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rea & Antonio</title>

<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:wght@400;500;600&family=Parisienne&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  padding:0;
  background:#d9d2c8;
  color:#5d5962;
  font-family:"Cormorant Garamond",serif;
  overflow-x:hidden;
}


/* =========================
   KUVERTA
========================= */

#envelopeScreen{
  position:fixed;
  inset:0;
  z-index:1000;

  display:flex;
  justify-content:center;
  align-items:center;

  background:#d9d2c8;

  transition:
  opacity 1.6s ease,
  transform 1.6s ease;
}

#envelopeScreen.opened{
  opacity:0;
  transform:scale(1.04);
  pointer-events:none;
}

.envelope{
  position:relative;

  width:min(100vw,600px);
  height:100svh;

  background:
  url("kuverta.PNG")
  center center /
  cover
  no-repeat;
}


/* BISER */

.pearl{
  position:absolute;

  left:50%;
  top:50%;

  transform:translate(-50%,-50%);

  width:76px;
  height:76px;

  border:0;
  border-radius:50%;

  cursor:pointer;

  background:
  radial-gradient(
    circle at 32% 27%,
    #ffffff 0%,
    #fffdf8 18%,
    #ebe4d8 46%,
    #c9beb0 72%,
    #a79b8d 100%
  );

  box-shadow:
  inset 7px 7px 13px rgba(255,255,255,.9),
  inset -9px -10px 15px rgba(120,105,90,.2),
  0 8px 18px rgba(80,70,60,.28);

  animation:pulse 2.4s infinite ease-in-out;
}

.pearl::after{
  content:"";

  position:absolute;

  width:18px;
  height:11px;

  top:17px;
  left:18px;

  border-radius:50%;

  background:rgba(255,255,255,.85);

  filter:blur(2px);
}

@keyframes pulse{

  0%,
  100%{
    transform:
    translate(-50%,-50%)
    scale(1);
  }

  50%{
    transform:
    translate(-50%,-50%)
    scale(1.07);
  }

}


.openText{
  position:absolute;

  left:0;
  right:0;
  bottom:7%;

  text-align:center;

  font-size:12px;

  letter-spacing:4px;

  text-transform:uppercase;

  color:#81786e;
}


/* =========================
   GLAVNI SADRŽAJ
========================= */

main{
  opacity:0;

  transition:opacity 1.6s ease;
}

main.visible{
  opacity:1;
}


/* =========================
   PRVA STRANICA
========================= */

.page{
  width:min(100%,600px);

  min-height:100svh;

  margin:0 auto;

  position:relative;

  background:
  url("zid.PNG")
  center center /
  cover
  no-repeat;

  display:flex;

  align-items:center;

  justify-content:center;

  text-align:center;

  padding:70px 34px;
}


.firstContent{
  position:relative;

  z-index:2;
}


.small{
  font-family:"Italiana",serif;

  font-size:14px;

  letter-spacing:4px;

  text-transform:uppercase;

  margin-bottom:22px;
}


.names{
  font-family:"Cormorant Garamond",serif;

  font-size:clamp(56px,14vw,86px);

  font-style:italic;

  font-weight:500;

  line-height:.92;

  margin:20px 0;

  color:#565a66;
}


.names span{
  font-size:.55em;

  font-style:normal;
}


.line{
  width:76px;

  height:1px;

  background:rgba(95,90,92,.38);

  margin:14px auto 18px;
}


.date{
  font-family:"Italiana",serif;

  font-size:24px;
}


.scroll{
  position:absolute;

  bottom:42px;

  left:0;

  right:0;

  font-size:12px;

  letter-spacing:4px;

  text-transform:uppercase;

  animation:float 2s infinite ease-in-out;
}


@keyframes float{

  0%,
  100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(8px);
  }

}


/* =========================
   GOTOVE STRANICE KAO SLIKE

   VAŽNO:
   NEMA min-height:100svh
   ZATO NEMA PRAZNINA
========================= */

.imagePage{
  width:min(100%,600px);

  margin:0 auto;

  padding:0;

  background:#efe6d8;

  line-height:0;

  font-size:0;
}


.imagePage img{
  width:100%;

  height:auto;

  display:block;

  margin:0;

  padding:0;

  border:0;
}


/* =========================
   POTVRDA DOLASKA
========================= */

.rsvp{
  width:min(100%,600px);

  min-height:100svh;

  margin:0 auto;

  padding:90px 34px;

  background:
  url("zid.PNG")
  center center /
  cover
  no-repeat;

  display:flex;

  align-items:center;

  justify-content:center;

  text-align:center;
}


.rsvp h2{
  font-family:"Parisienne",cursive;

  font-size:clamp(48px,12vw,76px);

  font-weight:400;

  margin:0 0 22px;

  color:#565a66;
}


.rsvp p{
  font-size:clamp(20px,5vw,27px);

  line-height:1.45;

  margin:0;
}


.rsvpDate{
  font-family:"Italiana",serif;

  font-size:clamp(30px,7vw,46px);

  margin:28px 0;
}


.contact{
  font-size:clamp(21px,5vw,30px);

  line-height:1.85;
}


.thanks{
  font-family:"Parisienne",cursive;

  font-size:56px;

  margin-top:34px;
}


/* =========================
   MOBITEL
========================= */

@media(max-width:600px){

  .page,
  .rsvp{
    padding-left:28px;
    padding-right:28px;
  }

}


/* =========================
   UKLANJANJE SVIH RAZMAKA
   IZMEĐU SLIKA
========================= */

.imagePage + .imagePage{
  margin-top:0;
}

.imagePage img + img{
  margin-top:0;
}

</style>

</head>


<body>


<!-- =========================
     KUVERTA
========================= -->

<div id="envelopeScreen">

  <div class="envelope">

    <button
      class="pearl"
      id="pearl"
      aria-label="Otvori pozivnicu">
    </button>

    <div class="openText">
      dodirnite biser da otvorite
    </div>

  </div>

</div>



<!-- =========================
     POZIVNICA
========================= -->

<main id="invitation">


<!-- PRVA STRANICA -->

<section class="page">

  <div class="firstContent">

    <div class="small">
      Pozivamo vas na naše vjenčanje
    </div>

    <div class="names">
      Rea
      <span>&amp;</span>
      <br>
      Antonio
    </div>

    <div class="line"></div>

    <div class="date">
      16. listopada 2026.
    </div>

  </div>


  <div class="scroll">
    zakoračite u našu priču ↓
  </div>

</section>



<!-- OKUPLJANJE -->

<section class="imagePage">

  <img
    src="okupljanje.PNG"
    alt="Okupljanje">

</section>



<!-- CRKVENI OBRED -->

<section class="imagePage">

  <img
    src="misa.PNG"
    alt="Crkveni obred">

</section>



<!-- SVADBENA PROSLAVA -->

<section class="imagePage">

  <img
    src="omorika.PNG"
    alt="Svadbena proslava">

</section>



<!-- POTVRDA DOLASKA -->

<section class="rsvp">

  <div>

    <h2>
      Potvrda dolaska
    </h2>


    <p>
      Molimo vas da svoj dolazak
      <br>
      potvrdite najkasnije do
    </p>


    <div class="rsvpDate">
      1. listopada 2026.
    </div>


    <div class="line"></div>


    <div class="contact">

      Rea
      <br>

      091 951 3980


      <br><br>


      Antonio
      <br>

      092 120 0512

    </div>


    <div class="thanks">
      Hvala!
    </div>

  </div>

</section>


</main>



<script>

/* =========================
   OTVARANJE POZIVNICE
========================= */

const pearl =
document.getElementById("pearl");

const envelopeScreen =
document.getElementById("envelopeScreen");

const invitation =
document.getElementById("invitation");


pearl.addEventListener(
"click",
function(){

  envelopeScreen.classList.add("opened");


  setTimeout(function(){

    envelopeScreen.style.display="none";

    invitation.classList.add("visible");

    window.scrollTo(0,0);

  },1600);

});

</script>


</body>

</html>
