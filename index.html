<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rea & Antonio</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:#d9d2c8;
  overflow-x:hidden;
}

/* KUVERTA */

#envelopeScreen{
  position:fixed;
  inset:0;
  z-index:1000;
  background:#d9d2c8;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:opacity 1.6s ease, transform 1.6s ease;
}

#envelopeScreen.opened{
  opacity:0;
  transform:scale(1.04);
  pointer-events:none;
}

.envelope{
  position:relative;
  width:min(100vw,600px);
  height:100svh;
  background:url("kuverta.PNG") center/cover no-repeat;
}

.pearl{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:76px;
  height:76px;
  border:0;
  border-radius:50%;
  cursor:pointer;
  background:radial-gradient(circle at 32% 27%,#fff 0%,#fffdf8 18%,#ebe4d8 46%,#c9beb0 72%,#a79b8d 100%);
  box-shadow:inset 7px 7px 13px rgba(255,255,255,.9), inset -9px -10px 15px rgba(120,105,90,.2), 0 8px 18px rgba(80,70,60,.28);
  animation:pulse 2.4s infinite ease-in-out;
}

@keyframes pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1)}
  50%{transform:translate(-50%,-50%) scale(1.07)}
}

.openText{
  position:absolute;
  left:0;
  right:0;
  bottom:7%;
  text-align:center;
  font-size:12px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#81786e;
}

/* POZIVNICA */

main{
  opacity:0;
  transition:opacity 1.6s ease;
}

main.visible{
  opacity:1;
}

.page{
  width:min(100%,600px);
  margin:0 auto;
  padding:0;
  line-height:0;
  font-size:0;
  background:#efe6d8;
}

.page img{
  width:100%;
  height:auto;
  display:block;
  margin:0;
  padding:0;
  border:0;
}
</style>
</head>

<body>

<div id="envelopeScreen">
  <div class="envelope">
    <button class="pearl" id="pearl" aria-label="Otvori pozivnicu"></button>
    <div class="openText">dodirnite biser da otvorite</div>
  </div>
</div>

<main id="invitation">

  <section class="page">
    <img src="naslovna2.PNG" alt="Rea i Antonio">
  </section>

  <section class="page">
    <img src="okupljanje2.PNG" alt="Okupljanje">
  </section>

  <section class="page">
    <img src="misa2.PNG" alt="Crkveni obred">
  </section>

  <section class="page">
    <img src="omorika2.PNG" alt="Svadbena proslava">
  </section>

  <section class="page">
    <img src="potvrda2.PNG" alt="Potvrda dolaska">
  </section>

</main>

<script>
const pearl = document.getElementById("pearl");
const envelopeScreen = document.getElementById("envelopeScreen");
const invitation = document.getElementById("invitation");

pearl.addEventListener("click", function(){
  envelopeScreen.classList.add("opened");

  setTimeout(function(){
    envelopeScreen.style.display = "none";
    invitation.classList.add("visible");
    window.scrollTo(0,0);
  },1600);
});
</script>

</body>
</html>
