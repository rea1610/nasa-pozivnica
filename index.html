<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Rea & Antonio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Italiana&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
      background: #e7e1d8;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: #e7e1d8;
      color: #55515a;
      font-family: "Cormorant Garamond", serif;
    }

    body.locked {
      height: 100vh;
      overflow: hidden;
    }

    /* KUVERTA */

    #envelopeScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(
        circle at center,
        #f8f4ed 0%,
        #eae4da 62%,
        #d5cec3 100%
      );
      transition:
        opacity 1.25s ease,
        visibility 1.25s ease,
        transform 1.25s ease;
    }

    #envelopeScreen.opened {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: scale(1.025);
    }

    .envelopeImage {
      position: relative;
      width: min(100vw, calc(92svh * 2 / 3), 600px);
      aspect-ratio: 2 / 3;
      background-image: url("kuverta.PNG");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      filter: drop-shadow(
        0 20px 30px rgba(75, 60, 44, 0.20)
      );
    }

    .pearlButton {
      position: absolute;
      left: 50%;
      top: 53%;
      transform: translate(-50%, -50%);
      width: 18%;
      aspect-ratio: 1 / 1;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      animation: pearlPulse 2.2s ease-in-out infinite;
    }

    @keyframes pearlPulse {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.06);
      }
    }

    .openText {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 6%;
      text-align: center;
      font-size: clamp(11px, 1.5vw, 15px);
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #756b60;
      pointer-events: none;
    }

    /* POZIVNICA */

    #invitation {
      position: relative;
      width: min(100%, 710px);
      margin: 0 auto;
      background: #f5eee4;
      opacity: 0;
      transition: opacity 1.3s ease;
    }

    #invitation.visible {
      opacity: 1;
    }

    .fullImage {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
      border: 0;
      vertical-align: top;
    }

    /* PRVA STRANICA */

    .heroPage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      aspect-ratio: 2 / 3;
      z-index: 10;
      color: #504d56;
      text-align: center;
      pointer-events: none;
    }

    .heroContent {
      position: absolute;
      top: 16%;
      left: 8%;
      right: 8%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .introText {
      margin: 0 0 20px;
      font-family: "Italiana", serif;
      font-size: clamp(10px, 1.7vw, 16px);
      font-weight: 400;
      letter-spacing: 0.23em;
      line-height: 1.45;
      text-transform: uppercase;
      color: #605a60;
    }

    .namesBlock {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 500;
      color: #504d56;
    }

    .firstName,
    .secondName {
      display: block;
      font-size: clamp(68px, 11.5vw, 112px);
      line-height: 0.82;
      letter-spacing: -0.025em;
    }

    .ampersand {
      display: block;
      margin: 5px 0 4px;
      font-size: clamp(29px, 4.6vw, 44px);
      line-height: 1;
      font-style: normal;
      font-weight: 500;
    }

    .divider {
      width: 82px;
      height: 1px;
      margin: 24px auto 17px;
      background: rgba(91, 82, 84, 0.38);
    }

    .weddingDate {
      margin: 0;
      font-size: clamp(23px, 3.7vw, 36px);
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: 0.025em;
      color: #57515a;
    }

    /* DONJI TEKST I STRELICA */

    .storyButton {
      position: absolute;
      left: 5%;
      right: 5%;
      bottom: 11%;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #696169;
      text-decoration: none;
      pointer-events: auto;
      cursor: pointer;
    }

    .storyText {
      font-family: "Italiana", serif;
      font-size: clamp(9px, 1.55vw, 15px);
      font-weight: 400;
      letter-spacing: 0.25em;
      line-height: 1.5;
      text-transform: uppercase;
    }

    .storyArrow {
      margin-top: 9px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(28px, 4.4vw, 42px);
      line-height: 1;
      animation: arrowMove 1.7s ease-in-out infinite;
    }

    @keyframes arrowMove {
      0%,
      100% {
        transform: translateY(0);
        opacity: 0.55;
      }

      50% {
        transform: translateY(11px);
        opacity: 1;
      }
    }

    /* MOBITEL */

    @media (max-width: 600px) {
      body {
        background: #f5eee4;
      }

      #invitation {
        width: 100%;
        max-width: none;
      }

      .heroContent {
        top: 15.5%;
        left: 6%;
        right: 6%;
      }

      .introText {
        margin-bottom: 14px;
        font-size: clamp(9px, 2.65vw, 13px);
        letter-spacing: 0.18em;
      }

      .firstName,
      .secondName {
        font-size: clamp(59px, 15.5vw, 84px);
        line-height: 0.84;
      }

      .ampersand {
        margin: 4px 0 3px;
        font-size: clamp(25px, 6.5vw, 37px);
      }

      .divider {
        width: 66px;
        margin-top: 18px;
        margin-bottom: 13px;
      }

      .weddingDate {
        font-size: clamp(19px, 5.4vw, 29px);
      }

      .storyButton {
        bottom: 10.5%;
      }

      .storyText {
        font-size: clamp(8px, 2.3vw, 12px);
        letter-spacing: 0.19em;
      }

      .storyArrow {
        margin-top: 7px;
        font-size: clamp(25px, 7vw, 35px);
      }
    }
  </style>
</head>

<body class="locked">

  <div id="envelopeScreen">
    <div class="envelopeImage">
      <button
        class="pearlButton"
        id="openInvitation"
        type="button"
        aria-label="Otvori pozivnicu"
      ></button>

      <div class="openText">
        Dodirnite biser da otvorite
      </div>
    </div>
  </div>

  <main id="invitation">
    <img
      src="cijela.png"
      alt="Pozivnica za vjenčanje Ree i Antonija"
      class="fullImage"
    >

    <section class="heroPage">
      <div class="heroContent">

        <p class="introText">
          Pozivamo vas na naše vjenčanje
        </p>

        <h1 class="namesBlock">
          <span class="firstName">Rea</span>
          <span class="ampersand">&amp;</span>
          <span class="secondName">Antonio</span>
        </h1>

        <div class="divider"></div>

        <p class="weddingDate">
          16. listopada 2026.
        </p>
      </div>

      <a
        href="#"
        class="storyButton"
        id="storyButton"
        aria-label="Zakoračite u našu priču"
      >
        <span class="storyText">
          Zakoračite u našu priču
        </span>

        <span class="storyArrow">
          ↓
        </span>
      </a>
    </section>
  </main>

  <script>
    const envelopeScreen =
      document.getElementById("envelopeScreen");

    const openInvitation =
      document.getElementById("openInvitation");

    const invitation =
      document.getElementById("invitation");

    const storyButton =
      document.getElementById("storyButton");

    let opened = false;

    function showInvitation() {
      if (opened) {
        return;
      }

      opened = true;

      envelopeScreen.classList.add("opened");
      invitation.classList.add("visible");

      setTimeout(function () {
        envelopeScreen.style.display = "none";
        document.body.classList.remove("locked");
        window.scrollTo(0, 0);
      }, 1250);
    }

    openInvitation.addEventListener(
      "click",
      showInvitation
    );

    storyButton.addEventListener(
      "click",
      function (event) {
        event.preventDefault();

        const invitationTop =
          invitation.getBoundingClientRect().top +
          window.scrollY;

        const firstPageHeight =
          invitation.clientWidth * 1.5;

        window.scrollTo({
          top: invitationTop + firstPageHeight,
          behavior: "smooth"
        });
      }
    );

    window.addEventListener(
      "load",
      function () {
        window.scrollTo(0, 0);
      }
    );
  </script>

</body>
</html>
